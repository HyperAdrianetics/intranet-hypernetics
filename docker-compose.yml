services:
  postgres:
    image: postgres:16-alpine
    container_name: cotizador-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cotizador
      POSTGRES_PASSWORD: cotizador
      POSTGRES_DB: cotizador
    ports:
      - '5434:5432'
    volumes:
      - cotizador_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cotizador -d cotizador']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cotizador_pgdata:
